version: '3'

vars:
  KUBECONFIG_PATH: '{{.KUBECONFIG_PATH | default "../../hack/.secret/kubeconfigs/platform-mesh.kubeconfig"}}'
  DEPLOYMENT_NAME: openmcp-onboarding-ui
  DEPLOYMENT_NAMESPACE: platform-mesh-system
  KIND_CLUSTER: platform-mesh

tasks:
  build:
    desc: Build the Angular web component
    cmds:
      - npm run build:wc

  docker:kind:
    desc: Build container image with current tag from kind cluster and load it
    vars:
      CONTAINER_RUNTIME: '{{.CONTAINER_RUNTIME | default "docker"}}'
      IMAGE_TAG:
        sh: KUBECONFIG={{.KUBECONFIG_PATH}} kubectl get deployment {{.DEPLOYMENT_NAME}} -n {{.DEPLOYMENT_NAMESPACE}} -o jsonpath='{.spec.template.spec.containers[0].image}' | cut -d':' -f2
      IMAGE_NAME: '{{.DEPLOYMENT_NAME}}:{{.IMAGE_TAG}}'
    cmds:
      - task: build
      - echo "Building image with tag {{.IMAGE_TAG}} using {{.CONTAINER_RUNTIME}}"
      - "{{.CONTAINER_RUNTIME}} build -t {{.IMAGE_NAME}} ."
      - |
        if [ "{{.CONTAINER_RUNTIME}}" = "podman" ]; then
          {{.CONTAINER_RUNTIME}} save {{.IMAGE_NAME}} -o /tmp/kind-image.tar
          kind load image-archive /tmp/kind-image.tar --name {{.KIND_CLUSTER}}
          rm -f /tmp/kind-image.tar
        else
          kind load docker-image {{.IMAGE_NAME}} --name {{.KIND_CLUSTER}}
        fi
      - KUBECONFIG={{.KUBECONFIG_PATH}} kubectl rollout restart deployment/{{.DEPLOYMENT_NAME}} -n {{.DEPLOYMENT_NAMESPACE}}
      - echo "Image loaded and deployment restarted"
