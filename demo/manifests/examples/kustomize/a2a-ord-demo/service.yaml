apiVersion: v1
kind: Service
metadata:
  name: spaceship-app
  namespace: default
  labels:
    app.kubernetes.io/name: spaceship-app
    app.kubernetes.io/part-of: a2a-ord-demo
spec:
  selector:
    app.kubernetes.io/name: spaceship-app
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
