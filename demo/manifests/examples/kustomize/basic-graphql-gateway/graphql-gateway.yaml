# GraphQLGateway instance — deploys the kubernetes-graphql-gateway Helm chart
# into the shoot cluster. The RGD handles the full OCM → Flux pipeline;
# the user only provides the shoot kubeconfig secret.
apiVersion: gateway.platform-mesh.io/v1alpha1
kind: GraphQLGateway
metadata:
  name: my-gateway
  namespace: default
spec:
  shootKubeconfigSecretName: my-cluster-kubeconfig
  shootKubeconfigSecretKey: kubeconfig
