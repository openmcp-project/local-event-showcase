apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: basic-app
  namespace: default
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: local-event-showcase
  path: ./demo/manifests/examples/kustomize/basic-app
  prune: true
  kubeConfig:
    secretRef:
      name: gardener-project-my-shoot2-kubeconfig
      key: kubeconfig