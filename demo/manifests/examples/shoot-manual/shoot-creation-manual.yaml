# Creates the Gardener Project to be used
apiVersion: gardener.cloud/v1alpha1
kind: GardenerProject
metadata:
  # adjust as needed
  name: default
  namespace: default

---
apiVersion: kubernetes.crossplane.io/v1alpha1
kind: ProviderConfig
metadata:
  name: gardener-default
spec:
  credentials:
    source: Secret
    secretRef:
      # This named secrets gets created namespace of the gardener project. Replace "default" with the name you chose above
      name: gardener-project-default-kubeconfig
      namespace: default
      key: kubeconfig


---
apiVersion: kubernetes.crossplane.io/v1alpha2
kind: Object
metadata:
  name: secret-local
spec:
  providerConfigRef:
    name: gardener-default
  forProvider:
    manifest:
      apiVersion: v1
      kind: Secret
      metadata:
        labels:
          provider.shoot.gardener.cloud/local: "true"
          reference.gardener.cloud/credentialsbinding: "true"
          reference.gardener.cloud/secretbinding: "true"
        name: local
        # Replace with the gardener Namespace visible in the status of the GardenProject.status.projectName
        namespace: <!!Replace!!>
      type: Opaque


---
apiVersion: kubernetes.crossplane.io/v1alpha2
kind: Object
metadata:
  name: credentialsbinding-local
spec:
  providerConfigRef:
    name: gardener-default
  forProvider:
    manifest:
      apiVersion: security.gardener.cloud/v1alpha1
      credentialsRef:
        apiVersion: v1
        kind: Secret
        name: local
        # Replace with the gardener Namespace visible in the status of the GardenProject.status.projectName
        namespace: <!!Replace!!>
      kind: CredentialsBinding
      metadata:
        labels:
          provider.extensions.gardener.cloud/local: "true"
        name: local
        # Replace with the gardener Namespace visible in the status of the GardenProject.status.projectName
        namespace: <!!Replace!!>
      provider:
        type: local

---
apiVersion: kubernetes.crossplane.io/v1alpha2
kind: Object
metadata:
  name: shoot-local
spec:
  providerConfigRef:
    name: gardener-default
  forProvider:
    manifest:
      apiVersion: core.gardener.cloud/v1beta1
      kind: Shoot
      metadata:
        name: local
        # Replace with the gardener Namespace visible in the status of the GardenProject.status.projectName
        namespace: <!!Replace!!>
        annotations:
          shoot.gardener.cloud/cloud-config-execution-max-delay-seconds: "0"
          authentication.gardener.cloud/issuer: "managed"
      spec:
        cloudProfile:
          name: local
        credentialsBindingName: local
        region: local
        networking:
          type: calico
          nodes: 10.0.0.0/16
        provider:
          type: local
          workers:
            - name: local
              machine:
                type: local
              cri:
                name: containerd
              minimum: 1
              maximum: 2
              maxSurge: 1
              maxUnavailable: 0
        kubernetes:
          kubelet:
            seccompDefault: true
            serializeImagePulls: false
            registryPullQPS: 10
            registryBurst: 20
            protectKernelDefaults: true
            streamingConnectionIdleTimeout: 5m