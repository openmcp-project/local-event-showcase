apiVersion: ui.platform-mesh.io/v1alpha1
kind: ProviderMetadata
metadata:
  name: opencp.cloud
spec:
  displayName: OpenControlPlane
  description: |
    Open Control Planes (OpenCP) enables extensible Infrastructure- and Configuration-as-Data capabilities as a Service. Part of ApeiroRA, leveraging the Kubernetes Resource Model to make cloud-edge resources accessible through declarative APIs and controllers.
  tags:
  - infrastructure
  - crossplane
  - kubernetes
  - multi-cluster
  - gitops
  contacts:
  - displayName: OpenControlPlane Team
    email: ManagedControlPlane@sap.com
    role: ["Technical Support"]
  documentation:
  - displayName: OpenControlPlane Documentation
    url: https://github.com/openmcp-project
  links:
  - displayName: GitHub Organization
    url: https://github.com/openmcp-project
  preferredSupportChannels:
  - displayName: GitHub Issues
    url: https://github.com/openmcp-project/mcp-operator/issues
  icon:
    light:
      data: "data:image/png;base64,"
    dark:
      data: "data:image/png;base64,"
