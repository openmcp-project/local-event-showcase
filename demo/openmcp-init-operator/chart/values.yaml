image:
  name: ghcr.io/openmcp/openmcp-init-operator
  tag: latest
  imagePullSecret: ghcr
  pullPolicy: ""

kcp:
  apiExportEndpointSliceName: openmcp.cloud
  platformMeshIP: ""
  hostOverride: ""

syncAgent:
  chartURL: ""
  imageRepository: ""
  imageTag: ""
  apiExportHostPortOverrides: []

mcp:
  kubeconfigSecret: ""
  issuerURL: ""
  serviceAccount: hsp
  namespace: default
  hostOverride: ""

runtime:
  namespace: default

# Tracing configuration (uses common library defaults)
tracing:
  enabled: false
  collector:
    endpoint: "localhost:4317"

# Health probe configuration (used by common.operatorHealthAndReadyness)
health:
  port: 8081
  periodSeconds: 10
  readiness:
    path: "/readyz"
    initialDelaySeconds: 5
  liveness:
    path: "/healthz"
    failureThreshold: 3
  startup:
    path: "/readyz"
    failureThreshold: 30

# Log configuration
log:
  level: info
  noJson: false

# Resource configuration (used by common.resources)
deployment:
  resources:
    limits:
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi

# Security context (used by common.pod.securityContext and common.container.securityContext)
securityContext:
  runAsUser: 1000
  runAsGroup: 3000
  fsGroup: 2000

# Operator deployment settings
operator:
  deployment:
    replicas: 1

# External secrets configuration
externalSecrets:
  enabled: false
  secretStore:
    kind: SecretStore
    name: environment-store
  mcpKubeconfig:
    key: ""
