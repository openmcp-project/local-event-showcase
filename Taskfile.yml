version: "3"

dotenv:
  - .env

vars:
  REG_NAME: kind-registry
  REG_PORT: "5001"
  LOCAL_OCI_REGISTRY: localhost:{{.REG_PORT}}
  LOCAL_OCM_REPO: "https://{{.LOCAL_OCI_REGISTRY}}/ocm"
  TMP_DIR: .tmp
  OCM_CONFIG: "{{.TMP_DIR}}/ocm-config.yaml"

  OPENMCP_KUBECONFIG_DIR: "{{.TMP_DIR}}/kubeconfigs"
  OPENMCP_PLATFORM_CLUSTER_KUBECONFIG: "{{.OPENMCP_KUBECONFIG_DIR}}/platform-int.kubeconfig"
  OPENMCP_PLATFORM_CLUSTER_EXT_KUBECONFIG: "{{.OPENMCP_KUBECONFIG_DIR}}/platform-ext.kubeconfig"
  OPENMCP_ONBOARDING_CLUSTER_EXT_KUBECONFIG: "{{.OPENMCP_KUBECONFIG_DIR}}/onboarding-ext.kubeconfig"
  OPENMCP_MCP_WORKERS_CLUSTER_EXT_KUBECONFIG: "{{.OPENMCP_KUBECONFIG_DIR}}/mcp-workers-ext.kubeconfig"
  OPENMCP_OCM_COMPONENT_NAME_OPENMCP_OPERATOR: "github.com/openmcp-project/openmcp-operator"
  OPENMCP_OCM_COMPONENT_NAME_CP_KIND: "github.com/openmcp-project/cluster-provider-kind"
  OPENMCP_OCM_COMPONENT_NAME_SP_CROSSPLANE: "github.com/openmcp-project/service-provider-crossplane"
  OPENMCP_OCM_COMPONENT_NAME_CROSSPLANE: "github.tools.sap/openmcp/releasechannel/crossplane"
  OPENMCP_OCM_COMPONENT_VERSION_CROSSPLANE: "v1.20.1-1"

tasks:
  tmp-dir:
    cmds:
      - mkdir -p {{.TMP_DIR}}

  certs:generate:
    desc: Generate CA and registry TLS certificates for HTTPS registry, plus OCM config for registry trust
    deps:
      - tmp-dir
    cmds:
      - mkdir -p {{.TMP_DIR}}/certs
      - |
        openssl req -x509 -newkey rsa:2048 -noenc \
          -subj "/CN=local-registry-ca" \
          -addext "basicConstraints=critical,CA:TRUE" \
          -addext "keyUsage=critical,keyCertSign,cRLSign" \
          -days 365 \
          -keyout {{.TMP_DIR}}/certs/ca.key \
          -out {{.TMP_DIR}}/certs/ca.crt
      - |
        openssl req -x509 -newkey rsa:2048 -noenc \
          -subj "/CN=kind-registry" \
          -addext "subjectAltName=DNS:localhost,DNS:kind-registry,IP:127.0.0.1" \
          -CA {{.TMP_DIR}}/certs/ca.crt \
          -CAkey {{.TMP_DIR}}/certs/ca.key \
          -days 365 \
          -keyout {{.TMP_DIR}}/certs/registry.key \
          -out {{.TMP_DIR}}/certs/registry.crt
      - |
        cat > $(pwd)/{{.TMP_DIR}}/ocm-config.yaml << EOF
        type: generic.config.ocm.software/v1
        configurations:
          - type: rootcerts.config.ocm.software
            rootCertificates:
              - path: $(pwd)/{{.TMP_DIR}}/certs/ca.crt
          - type: credentials.config.ocm.software
            repositories:
              - repository:
                  type: DockerConfig/v1
                  dockerConfigFile: "~/.docker/config.json"
                  propagateConsumerIdentity: true
        EOF
        echo "OCM config written to {{.TMP_DIR}}/ocm-config.yaml"
      - |
        echo "Certificates generated:"
        openssl x509 -in {{.TMP_DIR}}/certs/registry.crt -text -noout | grep -A2 "Subject Alternative Name" || true
      - |
        mkdir -p {{.TMP_DIR}}/containerd/certs.d/{{.REG_NAME}}:{{.REG_PORT}}
        cp {{.TMP_DIR}}/certs/ca.crt {{.TMP_DIR}}/containerd/certs.d/{{.REG_NAME}}:{{.REG_PORT}}/ca.crt
        echo "CA cert copied to certs.d: {{.TMP_DIR}}/containerd/certs.d/{{.REG_NAME}}:{{.REG_PORT}}/ca.crt"
    status:
      - test -z "${FORCE}" && test -f {{.TMP_DIR}}/certs/ca.crt && test -f {{.TMP_DIR}}/certs/registry.crt && test -f {{.TMP_DIR}}/ocm-config.yaml && test -f {{.TMP_DIR}}/containerd/certs.d/{{.REG_NAME}}:{{.REG_PORT}}/ca.crt

  local-registry:
    desc: Spin up a local Docker registry with HTTPS in the kind network
    deps:
      - certs:generate
    cmds:
      - |
        if docker inspect {{.REG_NAME}} >/dev/null 2>&1; then
          echo "Registry '{{.REG_NAME}}' already running, removing for HTTPS reconfigure..."
          docker rm -f {{.REG_NAME}}
        fi
        docker run -d \
          --restart=always \
          -p "127.0.0.1:{{.REG_PORT}}:{{.REG_PORT}}" \
          -e REGISTRY_HTTP_ADDR=0.0.0.0:{{.REG_PORT}} \
          -e REGISTRY_HTTP_TLS_CERTIFICATE=/certs/registry.crt \
          -e REGISTRY_HTTP_TLS_KEY=/certs/registry.key \
          -v "$(pwd)/{{.TMP_DIR}}/certs:/certs:ro" \
          -v registry-data:/var/lib/registry \
          --network kind \
          --name {{.REG_NAME}} \
          registry:2
        echo "HTTPS registry '{{.REG_NAME}}' started on https://localhost:{{.REG_PORT}}"

  local-registry:delete:
    desc: Delete the local Zot OCI registry and its data
    cmds:
      - docker rm -f {{.REG_NAME}} || true
      - docker volume rm registry-data || true

  openmcp:clone-distro:
    desc: Clones the openmcp distro you want to install
    deps:
      - local-registry
    vars:
      OPENMCP_OCM_REPOSITORY:
        sh: echo "${OPENMCP_OCM_REPOSITORY:-ghcr.io/openmcp-project/components}"
      OPENMCP_OCM_COMPONENT_NAME:
        sh: echo "${OPENMCP_OCM_COMPONENT_NAME:-github.com/openmcp-project/openmcp}"
    cmds:
      - |
        ocm --config $(pwd)/{{.OCM_CONFIG}} transfer component \
          --latest --copy-resources --recursive \
          {{.OPENMCP_OCM_REPOSITORY}}//{{.OPENMCP_OCM_COMPONENT_NAME}} \
          {{.LOCAL_OCM_REPO}}
      - |
        ocm --config $(pwd)/{{.OCM_CONFIG}} transfer components \
        --latest --copy-resources --recursive \
        ghcr.io/openmcp-project/components//github.com/openmcp-project/cluster-provider-kind \
        {{.LOCAL_OCM_REPO}}
      - |
        ocm --config $(pwd)/{{.OCM_CONFIG}} transfer components \
        --latest --copy-resources --recursive \
        ghcr.io/openmcp-project/components//github.com/openmcp-project/service-provider-crossplane \
        {{.LOCAL_OCM_REPO}}

  openmcp:create-platform-cluster:
    desc: Creates the platform cluster for openmcp
    cmds:
      - mkdir -p {{.TMP_DIR}}/containerd/certs.d/{{.REG_NAME}}:{{.REG_PORT}}
      - |
        cat > {{.TMP_DIR}}/containerd/certs.d/{{.REG_NAME}}:{{.REG_PORT}}/hosts.toml <<EOF
        [host."https://{{.REG_NAME}}:{{.REG_PORT}}"]
          capabilities = ["pull", "resolve"]
          ca = ["/etc/containerd/certs.d/{{.REG_NAME}}:{{.REG_PORT}}/ca.crt"]
        EOF
      - |
        cat > {{.TMP_DIR}}/kind-config.yaml <<EOF
        apiVersion: kind.x-k8s.io/v1alpha4
        kind: Cluster
        containerdConfigPatches:
          - |-
            [plugins."io.containerd.grpc.v1.cri".registry]
              config_path = "/etc/containerd/certs.d"
        nodes:
          - role: control-plane
            extraMounts:
              - hostPath: /var/run/docker.sock
                containerPath: /var/run/host-docker.sock
              - hostPath: $(pwd)/{{.TMP_DIR}}/containerd/certs.d
                containerPath: /etc/containerd/certs.d
                readOnly: true
              - hostPath: $(pwd)/{{.TMP_DIR}}/kind-config.yaml
                containerPath: /etc/kind/config.yaml
                readOnly: true
        EOF
      - |
        if kind get clusters | grep -q '^platform$'; then
          echo "Cluster 'platform' already exists"
        else
          kind create cluster --name platform --config {{.TMP_DIR}}/kind-config.yaml
        fi
      - mkdir -p {{.OPENMCP_KUBECONFIG_DIR}}
      - kind get kubeconfig --internal --name platform > {{.OPENMCP_PLATFORM_CLUSTER_KUBECONFIG}}
      - kind get kubeconfig --name platform > {{.OPENMCP_PLATFORM_CLUSTER_EXT_KUBECONFIG}}

  openmcp:flux-trust-registry-ca:
    desc: "Configure Flux source-controller to trust the local registry CA cert"
    cmds:
      - |
        kubectl create secret generic registry-ca \
          --namespace flux-system \
          --from-file=ca.crt={{.TMP_DIR}}/certs/ca.crt \
          --kubeconfig {{.OPENMCP_PLATFORM_CLUSTER_EXT_KUBECONFIG}} \
          --dry-run=client -o yaml \
          | kubectl apply --kubeconfig {{.OPENMCP_PLATFORM_CLUSTER_EXT_KUBECONFIG}} -f -
      - |
        kubectl patch deployment source-controller \
          --namespace flux-system \
          --kubeconfig {{.OPENMCP_PLATFORM_CLUSTER_EXT_KUBECONFIG}} \
          --type strategic \
          --patch '{
            "spec": {
              "template": {
                "spec": {
                  "volumes": [
                    {
                      "name": "registry-ca",
                      "secret": {
                        "secretName": "registry-ca"
                      }
                    }
                  ],
                  "containers": [
                    {
                      "name": "manager",
                      "volumeMounts": [
                        {
                          "name": "registry-ca",
                          "mountPath": "/etc/ssl/certs/registry-ca.crt",
                          "subPath": "ca.crt",
                          "readOnly": true
                        }
                      ]
                    }
                  ]
                }
              }
            }
          }'
      - |
        kubectl rollout status deployment/source-controller \
          --namespace flux-system \
          --kubeconfig {{.OPENMCP_PLATFORM_CLUSTER_EXT_KUBECONFIG}} \
          --timeout=120s

  openmcp:local:
    desc: Creates a local running openmcp platform in kind
    deps:
      - tmp-dir
      - openmcp:create-platform-cluster
    cmds:
      - flux install --kubeconfig {{.OPENMCP_PLATFORM_CLUSTER_EXT_KUBECONFIG}}
      - task: openmcp:flux-trust-registry-ca
      - |
        kubectl create secret generic registry-ca \
          --namespace=openmcp-system \
          --from-file=ca-bundle.crt={{.TMP_DIR}}/certs/ca.crt \
          --kubeconfig {{.OPENMCP_PLATFORM_CLUSTER_EXT_KUBECONFIG}} \
          --dry-run=client -o yaml \
          | kubectl apply --kubeconfig {{.OPENMCP_PLATFORM_CLUSTER_EXT_KUBECONFIG}} -f -
      - |
        set -x
        get_image_reference() {
          local resource_name="$1"
          yq '.component.resources[] | select(.name == "'"$resource_name"'") | .access.imageReference'
        }

        rewrite_image_ref() {
          sed 's|https\{0,1\}://localhost:{{.REG_PORT}}|{{.REG_NAME}}:{{.REG_PORT}}|'
        }

        export OPENMCP_OPERATOR_IMAGE=$(ocm --config $(pwd)/{{.OCM_CONFIG}} get component --latest {{.LOCAL_OCM_REPO}}//{{.OPENMCP_OCM_COMPONENT_NAME_OPENMCP_OPERATOR}} -oyaml | get_image_reference openmcp-operator-image | rewrite_image_ref)
        export CLUSTER_PROVIDER_KIND_IMAGE=$(ocm --config $(pwd)/{{.OCM_CONFIG}} get component --latest {{.LOCAL_OCM_REPO}}//{{.OPENMCP_OCM_COMPONENT_NAME_CP_KIND}} -oyaml | get_image_reference cluster-provider-kind-image | rewrite_image_ref)

        export SERVICE_PROVIDER_CROSSPLANE_IMAGE=$(ocm --config $(pwd)/{{.OCM_CONFIG}} get component --latest {{.LOCAL_OCM_REPO}}//{{.OPENMCP_OCM_COMPONENT_NAME_SP_CROSSPLANE}} -oyaml | get_image_reference service-provider-crossplane-image | rewrite_image_ref)
        export CROSSPLANE_CHART_IMAGE=$(ocm --config $(pwd)/{{.OCM_CONFIG}} get component {{.LOCAL_OCM_REPO}}//{{.OPENMCP_OCM_COMPONENT_NAME_CROSSPLANE}}:{{.OPENMCP_OCM_COMPONENT_VERSION_CROSSPLANE}} -oyaml | get_image_reference crossplane | rewrite_image_ref)
        export CROSSPLANE_DOCKER_IMAGE=$(ocm --config $(pwd)/{{.OCM_CONFIG}} get component {{.LOCAL_OCM_REPO}}//{{.OPENMCP_OCM_COMPONENT_NAME_CROSSPLANE}}:{{.OPENMCP_OCM_COMPONENT_VERSION_CROSSPLANE}} -oyaml | get_image_reference image-crossplane | rewrite_image_ref)
        export CROSSPLANE_DOCKER_IMAGE_TAG=$(echo "$CROSSPLANE_DOCKER_IMAGE" | sed 's/.*:\([^@:]*\)@.*/\1/')

        CROSSPLANE_PROVIDER_KUBERNETES_REF=$(ocm --config $(pwd)/{{.OCM_CONFIG}} get component --latest {{.LOCAL_OCM_REPO}}//github.tools.sap/openmcp/releasechannel/provider-kubernetes -oyaml | get_image_reference provider-kubernetes | rewrite_image_ref)
        export CROSSPLANE_PROVIDER_KUBERNETES_IMAGE=$(echo "$CROSSPLANE_PROVIDER_KUBERNETES_REF" | sed 's/:[^/:]*@.*//')
        export CROSSPLANE_PROVIDER_KUBERNETES_IMAGE_TAG=$(echo "$CROSSPLANE_PROVIDER_KUBERNETES_REF" | sed 's/.*:\([^@:]*\)@.*/\1/')

        export OPENMCP_KIND_CONFIG_PATH=$(pwd)/{{.TMP_DIR}}/kind-config.yaml
        export OPENMCP_CONTAINERD_CONFIG_PATH=$(pwd)/{{.TMP_DIR}}/containerd/certs.d

        kubectl kustomize ./openmcp/envs/local | envsubst > {{.TMP_DIR}}/openmcp-setup.yaml
      - bash hack/apply-with-crds.sh {{.OPENMCP_PLATFORM_CLUSTER_EXT_KUBECONFIG}} {{.TMP_DIR}}/openmcp-setup.yaml

  openmcp:export-onboarding-kubeconfig:
    desc: Export the onboarding cluster kubeconfig to the tmp folder
    cmds:
      - mkdir -p {{.OPENMCP_KUBECONFIG_DIR}}
      - |
        ONBOARDING_CLUSTER=$(kind get clusters | grep '^onboarding\.' | head -1)
        if [ -z "$ONBOARDING_CLUSTER" ]; then
          echo "No onboarding cluster found"
          exit 1
        fi
        echo "Exporting kubeconfig for onboarding cluster '$ONBOARDING_CLUSTER'"
        kind get kubeconfig --name "$ONBOARDING_CLUSTER" > {{.OPENMCP_ONBOARDING_CLUSTER_EXT_KUBECONFIG}}
        echo "Kubeconfig exported to {{.OPENMCP_ONBOARDING_CLUSTER_EXT_KUBECONFIG}}"

  openmcp:export-mcp-kubeconfig:
    desc: Export the mcp-workers cluster kubeconfig to the tmp folder
    cmds:
      - mkdir -p {{.OPENMCP_KUBECONFIG_DIR}}
      - |
        MCP_WORKERS_CLUSTER=$(kind get clusters | grep '^mcp-worker-' | head -1)
        if [ -z "$MCP_WORKERS_CLUSTER" ]; then
          echo "No mcp-workers cluster found"
          exit 1
        fi
        echo "Exporting kubeconfig for mcp-workers cluster '$MCP_WORKERS_CLUSTER'"
        kind get kubeconfig --name "$MCP_WORKERS_CLUSTER" > {{.OPENMCP_MCP_WORKERS_CLUSTER_EXT_KUBECONFIG}}
        echo "Kubeconfig exported to {{.OPENMCP_MCP_WORKERS_CLUSTER_EXT_KUBECONFIG}}"

  openmcp:create-mcp:
    desc: Apply the MCP manifest to the onboarding cluster
    cmds:
      - |
        ONBOARDING_CLUSTER=$(kind get clusters | grep '^onboarding\.' | head -1)
        if [ -z "$ONBOARDING_CLUSTER" ]; then
          echo "No onboarding cluster found"
          exit 1
        fi
        echo "Applying MCP manifest to cluster '$ONBOARDING_CLUSTER'"
        kubectl apply --kubeconfig <(kind get kubeconfig --name "$ONBOARDING_CLUSTER") -f ./openmcp/manifests/mcp.yaml
        kubectl apply --kubeconfig <(kind get kubeconfig --name "$ONBOARDING_CLUSTER") -f ./openmcp/manifests/crossplane.yaml
      - task: openmcp:export-mcp-kubeconfig

  openmcp:delete-clusters:
    desc: Delete the platform, onboarding, and mcp-worker kind clusters
    cmds:
      - kind delete cluster --name platform || true
      - |
        for cluster in $(kind get clusters | grep -E '^(onboarding\.|mcp-worker-)'); do
          kind delete cluster --name "$cluster"
        done
      - rm -rf {{.OPENMCP_KUBECONFIG_DIR}}

  integrate:
    desc: Run the openmcp platform-mesh integration script
    cmds:
      - bash hack/integrate-openmcp-platform-mesh.sh

  install-flux:
    desc: Install Flux on all mcp-worker kind clusters
    cmds:
      - bash hack/install-flux-mcp-clusters.sh

  delete-clusters:
    desc: Delete all kind clusters
    prompt: This will delete ALL kind clusters. Are you sure?
    cmds:
      - |
        for cluster in $(kind get clusters 2>/dev/null); do
          echo "Deleting kind cluster: $cluster"
          kind delete cluster --name "$cluster"
        done

  platform-mesh:local:
    desc: Checkout platform-mesh helm-charts and run local-setup:cached:showcase
    cmds:
      - |
        if [ -d demo/external/platform-mesh/helm-charts/.git ]; then
          cd demo/external/platform-mesh/helm-charts && git fetch origin && git checkout feat/local-event-showcase && git pull origin feat/local-event-showcase
        else
          rm -rf demo/external/platform-mesh/helm-charts
          mkdir -p demo/external/platform-mesh
          git clone -b feat/local-event-showcase https://github.com/platform-mesh/helm-charts.git demo/external/platform-mesh/helm-charts
        fi
      - task --dir demo/external/platform-mesh/helm-charts local-setup:cached:showcase

  platform-mesh:local:iterate:
    desc: Checkout platform-mesh helm-charts and run local-setup:cached:showcase:iterate
    cmds:
      - |
        if [ -d demo/external/platform-mesh/helm-charts/.git ]; then
          cd demo/external/platform-mesh/helm-charts && git fetch origin && git checkout feat/local-event-showcase && git pull origin feat/local-event-showcase
        else
          rm -rf demo/external/platform-mesh/helm-charts
          mkdir -p demo/external/platform-mesh
          git clone -b feat/local-event-showcase https://github.com/platform-mesh/helm-charts.git demo/external/platform-mesh/helm-charts
        fi
      - task --dir demo/external/platform-mesh/helm-charts local-setup:cached:showcase:iterate
